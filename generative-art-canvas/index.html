<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generative Art Canvas</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0e0e12;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #16161e;
      border-bottom: 1px solid #2a2a3a;
      flex-wrap: wrap;
      z-index: 10;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #c8b8ff;
      margin-right: 8px;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .sep { width: 1px; height: 24px; background: #2a2a3a; margin: 0 4px; }

    .tool-btn {
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      color: #ccc;
      padding: 5px 11px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .tool-btn:hover { background: #2a2a3e; color: #fff; }
    .tool-btn.active {
      background: #5a3fa0;
      border-color: #7c5fc0;
      color: #fff;
    }

    .action-btn {
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      color: #aaa;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .action-btn:hover { background: #2c2c40; color: #fff; }
    .action-btn.danger:hover { background: #3a1a1a; color: #ff7070; border-color: #5a2222; }

    label.slider-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #999;
      white-space: nowrap;
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 80px;
      height: 4px;
      background: #2a2a3a;
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #7c5fc0;
      cursor: pointer;
    }

    .color-swatch {
      width: 22px; height: 22px;
      border-radius: 5px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #fff; }

    input[type=color] {
      width: 22px; height: 22px;
      border: 2px solid #2a2a3a;
      border-radius: 5px;
      background: none;
      padding: 0;
      cursor: pointer;
    }

    #canvas-wrap {
      flex: 1;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #888;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s;
    }
    .hint.hidden { opacity: 0; }
  </style>
</head>
<body>

<header>
  <h1>Generative Art</h1>

  <div class="toolbar">
    <span style="font-size:11px;color:#666">BRUSH</span>
    <button class="tool-btn active" data-brush="trails">Trails</button>
    <button class="tool-btn" data-brush="spirals">Spirals</button>
    <button class="tool-btn" data-brush="particles">Particles</button>
    <button class="tool-btn" data-brush="web">Web</button>
    <button class="tool-btn" data-brush="stars">Stars</button>
  </div>

  <div class="sep"></div>

  <div class="toolbar">
    <span style="font-size:11px;color:#666">COLOR</span>
    <div class="color-swatch active" style="background:#c084fc" data-color="#c084fc"></div>
    <div class="color-swatch" style="background:#38bdf8" data-color="#38bdf8"></div>
    <div class="color-swatch" style="background:#f472b6" data-color="#f472b6"></div>
    <div class="color-swatch" style="background:#34d399" data-color="#34d399"></div>
    <div class="color-swatch" style="background:#fb923c" data-color="#fb923c"></div>
    <div class="color-swatch" style="background:#facc15" data-color="#facc15"></div>
    <button class="tool-btn" id="rainbowBtn">Rainbow</button>
    <input type="color" id="customColor" value="#c084fc" title="Custom color" />
  </div>

  <div class="sep"></div>

  <label class="slider-label">
    Size
    <input type="range" id="sizeSlider" min="4" max="80" value="20" />
  </label>

  <label class="slider-label">
    Opacity
    <input type="range" id="opacitySlider" min="5" max="100" value="70" />
  </label>

  <div class="sep"></div>

  <div class="toolbar">
    <button class="action-btn" id="undoBtn">Undo</button>
    <button class="action-btn danger" id="clearBtn">Clear</button>
    <button class="action-btn" id="saveBtn">Save PNG</button>
  </div>
</header>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div class="hint" id="hint">Click and drag to paint</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');
const hint = document.getElementById('hint');

let brush = 'trails';
let baseColor = '#c084fc';
let rainbow = false;
let brushSize = 20;
let opacity = 0.7;
let isDrawing = false;
let lastX = 0, lastY = 0;
let hue = 0;
let snapshots = [];
let frameId = null;
let pendingParticles = [];

// Resize canvas to fill wrapper
function resize() {
  const { width, height } = wrap.getBoundingClientRect();
  // preserve existing drawing
  const img = canvas.toDataURL();
  canvas.width = Math.floor(width);
  canvas.height = Math.floor(height);
  // fill black
  ctx.fillStyle = '#0e0e12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const i = new Image();
  i.onload = () => ctx.drawImage(i, 0, 0);
  i.src = img;
}

window.addEventListener('resize', resize);
resize();

// --- Color helpers ---
function currentColor(alpha) {
  if (rainbow) {
    hue = (hue + 1.5) % 360;
    return `hsla(${hue},90%,65%,${alpha})`;
  }
  const r = parseInt(baseColor.slice(1,3),16);
  const g = parseInt(baseColor.slice(3,5),16);
  const b = parseInt(baseColor.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// --- Brush implementations ---

function drawTrails(x, y, px, py) {
  const branches = Math.ceil(brushSize / 8);
  for (let i = 0; i < branches; i++) {
    const angle = Math.random() * Math.PI * 2;
    const len = brushSize * (0.3 + Math.random() * 0.9);
    const cx = x + Math.cos(angle) * len * 0.4;
    const cy = y + Math.sin(angle) * len * 0.4;
    ctx.beginPath();
    ctx.moveTo(px + (Math.random()-0.5)*4, py + (Math.random()-0.5)*4);
    ctx.quadraticCurveTo(cx, cy, x + (Math.random()-0.5)*3, y + (Math.random()-0.5)*3);
    ctx.strokeStyle = currentColor(opacity * (0.5 + Math.random() * 0.5));
    ctx.lineWidth = 0.8 + Math.random() * 2;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  // soft glow dot
  const g = ctx.createRadialGradient(x,y,0,x,y,brushSize*0.5);
  g.addColorStop(0, currentColor(opacity * 0.35));
  g.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.fillStyle = g;
  ctx.arc(x, y, brushSize*0.5, 0, Math.PI*2);
  ctx.fill();
}

function drawSpirals(x, y) {
  const turns = 2 + Math.random() * 3;
  const steps = Math.floor(turns * 30);
  const maxR = brushSize * (0.5 + Math.random() * 0.8);
  const startAngle = Math.random() * Math.PI * 2;
  const dir = Math.random() < 0.5 ? 1 : -1;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const r = t * maxR;
    const a = startAngle + dir * t * turns * Math.PI * 2;
    const sx = x + Math.cos(a) * r;
    const sy = y + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = currentColor(opacity * (0.6 + Math.random() * 0.4));
  ctx.lineWidth = 1 + Math.random() * 2;
  ctx.lineCap = 'round';
  ctx.stroke();
}

function spawnParticles(x, y) {
  const count = Math.floor(brushSize / 3) + 4;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    pendingParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.04,
      r: 1.5 + Math.random() * 3,
      color: currentColor(1),
    });
  }
  if (!frameId) animateParticles();
}

function animateParticles() {
  pendingParticles = pendingParticles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08; // gravity
    p.vx *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) return false;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace(/[\d.]+\)$/, `${p.life * opacity})`);
    ctx.fill();
    return true;
  });
  if (pendingParticles.length > 0) {
    frameId = requestAnimationFrame(animateParticles);
  } else {
    frameId = null;
  }
}

function drawWeb(x, y) {
  const spokes = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < spokes; i++) {
    const angle = (i / spokes) * Math.PI * 2 + Math.random() * 0.3;
    const len = brushSize * (0.6 + Math.random() * 0.9);
    const ex = x + Math.cos(angle) * len;
    const ey = y + Math.sin(angle) * len;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = currentColor(opacity * 0.7);
    ctx.lineWidth = 0.8 + Math.random();
    ctx.stroke();
    // cross-connect some tips
    if (i > 0 && Math.random() < 0.5) {
      const prevAngle = ((i-1) / spokes) * Math.PI * 2;
      const prevLen = brushSize * (0.6 + Math.random() * 0.9);
      const px2 = x + Math.cos(prevAngle) * prevLen;
      const py2 = y + Math.sin(prevAngle) * prevLen;
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(px2, py2);
      ctx.strokeStyle = currentColor(opacity * 0.35);
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

function drawStars(x, y) {
  const pts = 3 + Math.floor(Math.random() * 5);
  const outer = brushSize * (0.4 + Math.random() * 0.6);
  const inner = outer * (0.3 + Math.random() * 0.3);
  const rot = Math.random() * Math.PI * 2;
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const r = i % 2 === 0 ? outer : inner;
    const a = rot + (i * Math.PI) / pts;
    const sx = x + Math.cos(a) * r;
    const sy = y + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
  }
  ctx.closePath();
  const g = ctx.createRadialGradient(x,y,0,x,y,outer);
  g.addColorStop(0, currentColor(opacity));
  g.addColorStop(1, currentColor(opacity * 0.1));
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = currentColor(opacity * 0.8);
  ctx.lineWidth = 0.8;
  ctx.stroke();
}

// --- Input handling ---
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [
    (src.clientX - rect.left) * (canvas.width / rect.width),
    (src.clientY - rect.top) * (canvas.height / rect.height),
  ];
}

function paint(x, y, px, py) {
  switch(brush) {
    case 'trails':   drawTrails(x, y, px, py); break;
    case 'spirals':  drawSpirals(x, y); break;
    case 'particles': spawnParticles(x, y); break;
    case 'web':      drawWeb(x, y); break;
    case 'stars':    drawStars(x, y); break;
  }
}

function onStart(e) {
  e.preventDefault();
  pushSnapshot();
  hint.classList.add('hidden');
  const [x, y] = getPos(e);
  isDrawing = true;
  lastX = x; lastY = y;
  paint(x, y, x, y);
}

function onMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const [x, y] = getPos(e);
  const dist = Math.hypot(x - lastX, y - lastY);
  const step = Math.max(2, brushSize * 0.25);
  if (dist > step) {
    // interpolate for smooth strokes
    const steps = Math.ceil(dist / step);
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      const ix = lastX + (x - lastX) * t;
      const iy = lastY + (y - lastY) * t;
      paint(ix, iy, ix - (x-lastX)/steps, iy - (y-lastY)/steps);
    }
    lastX = x; lastY = y;
  }
}

function onEnd(e) { isDrawing = false; }

canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onEnd);
canvas.addEventListener('mouseleave', onEnd);
canvas.addEventListener('touchstart', onStart, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onEnd);

// --- Undo ---
function pushSnapshot() {
  if (snapshots.length > 15) snapshots.shift();
  snapshots.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
}

document.getElementById('undoBtn').addEventListener('click', () => {
  if (snapshots.length > 0) {
    ctx.putImageData(snapshots.pop(), 0, 0);
  }
});

// --- Clear ---
document.getElementById('clearBtn').addEventListener('click', () => {
  pushSnapshot();
  ctx.fillStyle = '#0e0e12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  hint.classList.remove('hidden');
});

// --- Save ---
document.getElementById('saveBtn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = `generative-art-${Date.now()}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
});

// --- Brush buttons ---
document.querySelectorAll('[data-brush]').forEach(btn => {
  btn.addEventListener('click', () => {
    brush = btn.dataset.brush;
    document.querySelectorAll('[data-brush]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// --- Color swatches ---
document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    rainbow = false;
    baseColor = sw.dataset.color;
    document.getElementById('rainbowBtn').classList.remove('active');
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
  });
});

document.getElementById('customColor').addEventListener('input', e => {
  rainbow = false;
  baseColor = e.target.value;
  document.getElementById('rainbowBtn').classList.remove('active');
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
});

document.getElementById('rainbowBtn').addEventListener('click', () => {
  rainbow = !rainbow;
  document.getElementById('rainbowBtn').classList.toggle('active', rainbow);
  if (rainbow) document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
});

// --- Sliders ---
document.getElementById('sizeSlider').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
});
document.getElementById('opacitySlider').addEventListener('input', e => {
  opacity = parseInt(e.target.value) / 100;
});
</script>
</body>
</html>
